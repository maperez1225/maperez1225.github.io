    <style>
        /* ===== MUNDIAL 2026 ===== */
        .wc-wrapper {
            width: 100%;
            max-width: 1200px;
            margin-top: 50px;
            padding-top: 32px;
            border-top: 2px solid #1e1e1e;
        }
        .wc-section { margin-bottom: 52px; }
        .wc-section-title {
            font-size: 20px;
            font-weight: 700;
            color: #fff;
            border-left: 4px solid #00c97a;
            padding-left: 14px;
            margin: 0 0 20px;
        }
        .wc-loading { color: #555; font-style: italic; padding: 16px 0; }

        /* Teams */
        .teams-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 10px;
        }
        .team-card {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 10px;
            padding: 12px 8px;
            text-align: center;
            transition: border-color 0.2s, transform 0.15s;
            cursor: default;
        }
        .team-card:hover { border-color: #00c97a; transform: translateY(-2px); }
        .team-flag-img {
            width: 50px; height: 34px;
            object-fit: cover;
            border-radius: 3px;
            display: block;
            margin: 0 auto 8px;
            background: #2a2a2a;
        }
        .team-card-name {
            font-size: 11px;
            color: #ccc;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Groups */
        .groups-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
            gap: 14px;
        }
        .group-card {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 10px;
            overflow: hidden;
        }
        .group-card-header {
            background: #00c97a;
            color: #0a0a0a;
            font-weight: 700;
            font-size: 13px;
            padding: 9px 14px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        .standing-table { width: 100%; border-collapse: collapse; font-size: 11.5px; }
        .standing-table th {
            color: #555;
            padding: 6px 6px;
            text-align: center;
            border-bottom: 1px solid #252525;
            font-weight: 600;
            font-size: 10px;
        }
        .standing-table th:first-child { text-align: left; padding-left: 12px; }
        .standing-table td {
            padding: 7px 6px;
            text-align: center;
            border-bottom: 1px solid #1e1e1e;
            color: #bbb;
        }
        .standing-table td:first-child { padding-left: 12px; }
        .standing-table tr:last-child td { border-bottom: none; }
        .st-team-cell { display: flex; align-items: center; gap: 7px; }
        .st-flag {
            width: 20px; height: 14px;
            object-fit: cover; border-radius: 2px;
            background: #333; flex-shrink: 0;
        }
        .st-pts { font-weight: 700; color: #fff; }

        /* Calendar */
        .date-group { margin-bottom: 26px; }
        .date-label {
            font-size: 13px;
            font-weight: 600;
            color: #555;
            text-transform: capitalize;
            margin-bottom: 10px;
            padding-bottom: 8px;
            border-bottom: 1px solid #1e1e1e;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .date-label.today-label { color: #00c97a; }
        .today-pill {
            background: #00c97a;
            color: #0a0a0a;
            font-size: 9px;
            font-weight: 800;
            padding: 2px 8px;
            border-radius: 20px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .match-card {
            background: #1a1a1a;
            border: 1px solid #252525;
            border-radius: 10px;
            padding: 11px 14px;
            margin-bottom: 7px;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: border-color 0.3s;
        }
        .match-card.is-live {
            border-color: #c0392b;
            box-shadow: 0 0 14px rgba(192,57,43,0.2);
        }
        .match-card.is-finished { opacity: 0.65; }
        .match-time-col {
            font-size: 12px; color: #666;
            min-width: 46px; text-align: center; flex-shrink: 0;
        }
        .live-badge {
            background: #c0392b; color: #fff;
            font-size: 9px; font-weight: 800;
            padding: 3px 7px; border-radius: 5px;
            animation: livePulse 1.3s ease-in-out infinite;
            min-width: 46px; text-align: center;
            letter-spacing: 0.3px;
        }
        @keyframes livePulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        .match-body {
            flex: 1; display: flex; align-items: center;
            gap: 8px; min-width: 0;
        }
        .match-team-block {
            flex: 1; display: flex; align-items: center;
            gap: 7px; min-width: 0;
        }
        .match-team-block.home-block { justify-content: flex-end; }
        .match-team-block.away-block { justify-content: flex-start; }
        .match-flag {
            width: 26px; height: 18px;
            object-fit: cover; border-radius: 2px;
            background: #2a2a2a; flex-shrink: 0;
        }
        .match-team-name {
            font-size: 12px; color: #ddd;
            white-space: nowrap; overflow: hidden;
            text-overflow: ellipsis; max-width: 90px;
        }
        .match-score-block {
            font-size: 18px; font-weight: 700; color: #fff;
            min-width: 58px; text-align: center;
            flex-shrink: 0; letter-spacing: 1px;
        }
        .match-score-block.pre-match {
            font-size: 13px; color: #3a3a3a; font-weight: 400;
        }
        .match-stage-label {
            font-size: 10px; color: #444;
            min-width: 68px; text-align: right;
            flex-shrink: 0; white-space: nowrap;
        }

        /* Live Now */
        .live-now-header {
            display: flex; align-items: center;
            gap: 10px; margin-bottom: 14px;
        }
        .live-dot {
            width: 10px; height: 10px;
            background: #c0392b; border-radius: 50%;
            animation: livePulse 1s infinite; flex-shrink: 0;
        }
        .live-now-title {
            font-size: 16px; font-weight: 700;
            color: #c0392b; text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        @media (max-width: 600px) {
            .match-team-name { max-width: 58px; font-size: 11px; }
            .match-score-block { min-width: 44px; font-size: 16px; }
            .match-stage-label { display: none; }
            .teams-grid { grid-template-columns: repeat(auto-fill, minmax(82px, 1fr)); }
        }
    </style>

        <script>
            const channels = {
                dsports: {
                    name: "DSPORTS",
                    manifest: "https://prope66bd35h.airspace-cdn.cbsivideo.com/out/v1/eb04c8bf15a94f14ad1d952659d422b7/manifest.mpd",
                    keyId: "9afc53e82bb24c20a5835a84138f6c13",
                    key: "abdd52917474f2342ff04f0d4722123a"
                },
                dsports2: {
                    name: "DSPORTS 2",
                    manifest: "https://prope79d3g55.airspace-cdn.cbsivideo.com/out/v1/faa5cf8cb19e4de99417df05a463f9d5/manifest.mpd",
                    keyId: "010b4fa338184f52a712121ad62ae9b4",
                    key: "e310bad2a570b60f7799e2aa0fb33a71"
                },
                dsportsPlus: {
                    name: "DSPORTS +",
                    manifest: "https://prope9660ag6.airspace-cdn.cbsivideo.com/out/v1/a634dbd5b8474f38b38a8ce37dd77b50/manifest.mpd",
                    keyId: "41121cea7a3d49a78c9496d1b0d919e4",
                    key: "de048d4c2870b8d53961aaeac1804947"
                }
            };

            let player;
            let videoContainer;
            const statusDiv = document.getElementById('status');
            const buttons = document.querySelectorAll('.channel-btn');

            const theaterBtn = document.getElementById('theaterBtn');
            const controlsDiv = document.querySelector('.controls');
            
            let theaterMode = false;
            
            theaterBtn.addEventListener('click', () => {
                theaterMode = !theaterMode;
            
                videoContainer.classList.toggle('theater-mode', theaterMode);
                controlsDiv.classList.toggle('theater-controls', theaterMode);
                document.body.classList.toggle('theater-body', theaterMode);
            
                theaterBtn.textContent = theaterMode
                    ? '↙ Salir Teatro'
                    : '🎭 Modo Teatro';
            });


            async function initApp() {
                shaka.polyfill.installAll();
                if (shaka.Player.isBrowserSupported()) {
                    initPlayer();
                } else {
                    statusDiv.innerText = "Error: Tu navegador no soporta Shaka Player.";
                }
            }

            async function initPlayer() {
                videoContainer = document.querySelector('[data-shaka-player-container]');
                const video = document.querySelector('[data-shaka-player]');
                const ui = video['ui'];
                const controls = ui.getControls();
                player = controls.getPlayer();

                const config = {
                    'controlPanelElements': [
                        'play_pause',
                        'time_and_duration',
                        'mute',
                        'volume',
                        'spacer',
                        'overflow_menu',
                        'fullscreen',
                    ],
                    'contextMenuElements' : [
                        'statistics',
                    ],
                    'overflowMenuButtons' : [
                        'quality',
                        'statistics',
                    ],
                    'statisticsList' : [
                        'width',
                        'height',
                        'currentCodecs',
                        'estimatedBandwidth',
                        'streamBandwidth',
                        'liveLatency',
                        'bufferingTime',
                        'stallsDetected',
                    ],
                }
                ui.configure(config);

                player.configure({
                    streaming: {
                        bufferingGoal: 16,
                        bufferBehind: 10,
                    },
                });
                
                player.addEventListener('error', onPlayerErrorEvent);

                buttons.forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        buttons.forEach(b => b.classList.remove('active'));
                        e.target.classList.add('active');
                        loadChannel(e.target.dataset.id);
                    });
                });
                loadChannel('dsports')
            }

            async function loadChannel(channelId) {
                const channel = channels[channelId];
                const clearKeysConfig = {};
                clearKeysConfig[channel.keyId] = channel.key;

                player.configure({
                    preferredAudio: [{
                        channelCount: 6
                    }],
                    drm: {
                        clearKeys: clearKeysConfig
                    }
                });

                try {
                    await player.load(channel.manifest);
                } catch (e) {
                    onPlayerError(e);
                }
            }

            function onPlayerErrorEvent(event) {
                onPlayerError(event.detail);
            }

            function onPlayerError(error) {
                console.error('Error de Shaka Player', error);
                statusDiv.innerText = `Error: Código ${error.code}`;
            }

            document.addEventListener('shaka-ui-loaded', initApp);
            if (document.readyState === 'complete' && window.shaka) {
                initApp();
            }
        </script>

    <script>
    (function () {
        'use strict';

        const API   = 'https://worldcup26.ir';
        const TOKEN = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpZCI6IjZhMzA4YzcyNWE5YjM0NGQyYjFjYzI2MSIsImlhdCI6MTc4MTU2NjU4NiwiZXhwIjoxNzg4ODI0MTg2fQ.VF6bY241_t_TYnvE8aJRJTTILfwJ34JBqlXtSFVK4XQ';
        const H     = { Authorization: 'Bearer ' + TOKEN };

        let allGames    = [];
        let allTeams    = [];
        let teamsByName = {};   // english name → team object
        let liveTimers  = {};   // gameId → intervalId

        const STAGE_LABEL = {
            group : 'Fase de Grupos',
            r32   : 'Ronda de 32',
            r16   : 'Octavos de Final',
            qf    : 'Cuartos de Final',
            sf    : 'Semifinal',
            third : '3er Puesto',
            final : 'Final'
        };

        /* ── helpers ─────────────────────────────────────── */

        function isLive(g) {
            const te = String(g.time_elapsed || '').toLowerCase();
            return g.finished !== 'TRUE'
                && te !== 'notstarted'
                && te !== ''
                && te !== 'ft'
                && te !== 'finished';
        }

        function isDone(g) { return g.finished === 'TRUE'; }

        /* local_date format: "MM/DD/YYYY HH:mm" */
        function parseLocalDate(g) {
            if (!g.local_date) return null;
            const parts = g.local_date.split(' ');
            const dp    = parts[0].split('/');   // [MM, DD, YYYY]
            const tp    = parts[1] || '00:00';
            return new Date(dp[2] + '-' + dp[0].padStart(2,'0') + '-' + dp[1].padStart(2,'0') + 'T' + tp + ':00');
        }

        function todayKey() {
            const d = new Date();
            return d.getFullYear() + '-' +
                String(d.getMonth() + 1).padStart(2, '0') + '-' +
                String(d.getDate()).padStart(2, '0');
        }

        function gameDateKey(g) {
            if (!g.local_date) return '';
            const dp = g.local_date.split(' ')[0].split('/'); // [MM, DD, YYYY]
            return dp[2] + '-' + dp[0].padStart(2,'0') + '-' + dp[1].padStart(2,'0');
        }

        function fmtTime(g) {
            if (!g.local_date) return '--:--';
            return g.local_date.split(' ')[1] || '--:--';
        }

        function fmtDateLabel(dateStr) {
            return new Date(dateStr + 'T12:00:00').toLocaleDateString('es-ES', {
                weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
            });
        }

        function mkFlag(url, cls) {
            const img = document.createElement('img');
            img.className = cls;
            img.alt = '';
            if (url) img.src = url;
            img.onerror = () => { img.style.visibility = 'hidden'; };
            return img;
        }

        async function apiFetch(path) {
            const r = await fetch(API + path, { headers: H });
            if (!r.ok) throw new Error('HTTP ' + r.status);
            return r.json();
        }

        /* ── match card builder ───────────────────────────── */

        function buildCard(g, idPrefix) {
            const live     = isLive(g);
            const done     = isDone(g);
            const homeName = g.home_team_name_en || g.home_team_label || '—';
            const awayName = g.away_team_name_en || g.away_team_label || '—';
            const homeTeam = teamsByName[homeName];
            const awayTeam = teamsByName[awayName];
            const homeFlag = homeTeam && homeTeam.flag;
            const awayFlag = awayTeam && awayTeam.flag;

            const card = document.createElement('div');
            card.className = 'match-card' + (live ? ' is-live' : '') + (done ? ' is-finished' : '');
            card.id = idPrefix + '-' + g.id;

            /* time / live badge */
            const timeCol = document.createElement('div');
            if (live) {
                const raw   = String(g.time_elapsed).toUpperCase();
                const label = raw === 'HT' ? 'MT' : raw === 'ET' ? 'ET' : raw + "'";
                timeCol.innerHTML = '<div class="live-badge">🔴 ' + label + '</div>';
            } else {
                timeCol.className = 'match-time-col';
                timeCol.textContent = done ? 'FT' : fmtTime(g);
            }
            card.appendChild(timeCol);

            /* teams + score */
            const body = document.createElement('div');
            body.className = 'match-body';

            /* home (right-aligned toward center) */
            const homeBlock = document.createElement('div');
            homeBlock.className = 'match-team-block home-block';
            const homeNameEl = document.createElement('span');
            homeNameEl.className = 'match-team-name';
            homeNameEl.textContent = homeName;
            homeBlock.appendChild(homeNameEl);
            if (homeFlag) homeBlock.appendChild(mkFlag(homeFlag, 'match-flag'));
            body.appendChild(homeBlock);

            /* score */
            const scoreBlock = document.createElement('div');
            scoreBlock.className = 'match-score-block' + (live || done ? '' : ' pre-match');
            if (live || done) {
                scoreBlock.textContent = (g.home_score != null ? g.home_score : '-')
                    + ' - ' + (g.away_score != null ? g.away_score : '-');
            } else {
                scoreBlock.textContent = 'vs';
            }
            body.appendChild(scoreBlock);

            /* away (left-aligned from center) */
            const awayBlock = document.createElement('div');
            awayBlock.className = 'match-team-block away-block';
            if (awayFlag) awayBlock.appendChild(mkFlag(awayFlag, 'match-flag'));
            const awayNameEl = document.createElement('span');
            awayNameEl.className = 'match-team-name';
            awayNameEl.textContent = awayName;
            awayBlock.appendChild(awayNameEl);
            body.appendChild(awayBlock);

            card.appendChild(body);

            /* stage label */
            const stageEl = document.createElement('div');
            stageEl.className = 'match-stage-label';
            stageEl.textContent = STAGE_LABEL[g.type] || g.type || '';
            card.appendChild(stageEl);

            return card;
        }

        /* ── RENDER: Teams ────────────────────────────────── */

        function renderTeams() {
            const grid = document.getElementById('wcTeamsGrid');
            grid.innerHTML = '';
            [...allTeams].sort(function (a, b) { return (a.name_en||'').localeCompare(b.name_en||''); })
                .forEach(function (t) {
                    const card = document.createElement('div');
                    card.className = 'team-card';
                    const img = mkFlag(t.flag, 'team-flag-img');
                    img.alt = t.name_en || '';
                    const nameEl = document.createElement('div');
                    nameEl.className = 'team-card-name';
                    nameEl.textContent = t.name_en || '';
                    card.appendChild(img);
                    card.appendChild(nameEl);
                    grid.appendChild(card);
                });
        }

        /* ── RENDER: Groups ───────────────────────────────── */

        function computeStandings() {
            const st = {};
            allGames.filter(function (g) { return g.type === 'group'; }).forEach(function (g) {
                const grp = g.group;
                if (!st[grp]) st[grp] = {};
                [g.home_team_name_en, g.away_team_name_en].forEach(function (name) {
                    if (name && !st[grp][name])
                        st[grp][name] = { mp:0, w:0, d:0, l:0, gf:0, ga:0, gd:0, pts:0 };
                });
                if (g.finished === 'TRUE' && g.home_team_name_en && g.away_team_name_en) {
                    const hg = parseInt(g.home_score) || 0;
                    const ag = parseInt(g.away_score) || 0;
                    const hs = st[grp][g.home_team_name_en];
                    const as = st[grp][g.away_team_name_en];
                    hs.mp++; hs.gf += hg; hs.ga += ag; hs.gd = hs.gf - hs.ga;
                    as.mp++; as.gf += ag; as.ga += hg; as.gd = as.gf - as.ga;
                    if (hg > ag)      { hs.w++; hs.pts += 3; as.l++; }
                    else if (hg < ag) { as.w++; as.pts += 3; hs.l++; }
                    else              { hs.d++; hs.pts++; as.d++; as.pts++; }
                }
            });
            return st;
        }

        function renderGroups() {
            const grid = document.getElementById('wcGroupsGrid');
            grid.innerHTML = '';
            const standings = computeStandings();
            Object.keys(standings).sort().forEach(function (grp) {
                const rows = Object.entries(standings[grp])
                    .sort(function (a, b) {
                        return (b[1].pts - a[1].pts) || (b[1].gd - a[1].gd) || (b[1].gf - a[1].gf);
                    });

                const card = document.createElement('div');
                card.className = 'group-card';

                const hdr = document.createElement('div');
                hdr.className = 'group-card-header';
                hdr.textContent = 'Grupo ' + grp;
                card.appendChild(hdr);

                const table = document.createElement('table');
                table.className = 'standing-table';
                table.innerHTML =
                    '<thead><tr>' +
                    '<th>Equipo</th>' +
                    '<th title="Partidos Jugados">PJ</th>' +
                    '<th title="Ganados">G</th>' +
                    '<th title="Empatados">E</th>' +
                    '<th title="Perdidos">P</th>' +
                    '<th title="Goles a Favor">GF</th>' +
                    '<th title="Goles en Contra">GC</th>' +
                    '<th title="Diferencia">DG</th>' +
                    '<th title="Puntos">PTS</th>' +
                    '</tr></thead>';

                const tbody = document.createElement('tbody');
                rows.forEach(function (entry) {
                    const name = entry[0], s = entry[1];
                    const flag = teamsByName[name] && teamsByName[name].flag;
                    const tr = document.createElement('tr');
                    tr.innerHTML =
                        '<td><div class="st-team-cell">' +
                        (flag ? '<img class="st-flag" src="' + flag + '" alt="' + name + '" onerror="this.style.visibility=\'hidden\'">' : '') +
                        '<span>' + name + '</span></div></td>' +
                        '<td>' + s.mp + '</td>' +
                        '<td>' + s.w  + '</td>' +
                        '<td>' + s.d  + '</td>' +
                        '<td>' + s.l  + '</td>' +
                        '<td>' + s.gf + '</td>' +
                        '<td>' + s.ga + '</td>' +
                        '<td>' + (s.gd >= 0 ? '+' : '') + s.gd + '</td>' +
                        '<td class="st-pts">' + s.pts + '</td>';
                    tbody.appendChild(tr);
                });

                table.appendChild(tbody);
                card.appendChild(table);
                grid.appendChild(card);
            });
        }

        /* ── RENDER: Calendar ─────────────────────────────── */

        function renderCalendar() {
            const container = document.getElementById('wcCalendar');
            container.innerHTML = '';

            const byDate = {};
            allGames.forEach(function (g) {
                const key = gameDateKey(g);
                if (!key) return;
                if (!byDate[key]) byDate[key] = [];
                byDate[key].push(g);
            });

            const today    = todayKey();
            const allDates = Object.keys(byDate).sort();

            /* today first, then rest chronologically */
            const ordered = allDates.indexOf(today) >= 0
                ? [today].concat(allDates.filter(function (d) { return d !== today; }))
                : allDates;

            ordered.forEach(function (dateStr) {
                const dayGames = byDate[dateStr]
                    .slice()
                    .sort(function (a, b) { return (a.local_date || '').localeCompare(b.local_date || ''); });
                const isToday = dateStr === today;

                const group = document.createElement('div');
                group.className = 'date-group';

                const label = document.createElement('div');
                label.className = 'date-label' + (isToday ? ' today-label' : '');
                label.innerHTML = fmtDateLabel(dateStr) +
                    (isToday ? ' <span class="today-pill">Hoy</span>' : '');
                group.appendChild(label);

                dayGames.forEach(function (g) {
                    group.appendChild(buildCard(g, 'cal'));
                });

                container.appendChild(group);
            });
        }

        /* ── RENDER: Live Now ─────────────────────────────── */

        function renderLiveNow() {
            const section   = document.getElementById('wcLiveNow');
            const container = document.getElementById('wcLiveContainer');
            const liveGames = allGames.filter(isLive);

            if (!liveGames.length) {
                section.style.display = 'none';
                return;
            }
            section.style.display = 'block';
            container.innerHTML = '';
            liveGames.forEach(function (g) {
                container.appendChild(buildCard(g, 'live'));
            });
        }

        /* ── Polling: individual live game ───────────────── */

        function patchGame(updated) {
            const idx = allGames.findIndex(function (g) { return String(g.id) === String(updated.id); });
            if (idx < 0) return;
            allGames[idx] = Object.assign({}, allGames[idx], updated);

            /* update calendar card in-place */
            const calCard = document.getElementById('cal-' + updated.id);
            if (calCard) calCard.replaceWith(buildCard(allGames[idx], 'cal'));

            /* refresh the live-now strip */
            renderLiveNow();
        }

        function startGamePoll(gameId) {
            if (liveTimers[gameId]) return;   /* already polling */
            liveTimers[gameId] = setInterval(function () {
                apiFetch('/get/game/' + gameId)
                    .then(function (data) {
                        const g = data.game;
                        if (!g) return;
                        patchGame(g);
                        if (!isLive(g)) {
                            clearInterval(liveTimers[gameId]);
                            delete liveTimers[gameId];
                        }
                    })
                    .catch(function (e) { console.warn('[WC] poll game', gameId, e); });
            }, 60000);
        }

        function syncPolling() {
            const liveGames = allGames.filter(isLive);
            const liveIds   = {};
            liveGames.forEach(function (g) { liveIds[String(g.id)] = true; });

            /* start new timers */
            liveGames.forEach(function (g) { startGamePoll(String(g.id)); });

            /* stop stale timers */
            Object.keys(liveTimers).forEach(function (id) {
                if (!liveIds[id]) {
                    clearInterval(liveTimers[id]);
                    delete liveTimers[id];
                }
            });

            renderLiveNow();
        }

        /* ── Global refresh (detect newly started games) ──── */

        function refreshAllGames() {
            apiFetch('/get/games')
                .then(function (data) {
                    allGames = data.games || [];
                    syncPolling();
                    /* re-render calendar only to reflect status changes */
                    renderCalendar();
                })
                .catch(function (e) { console.warn('[WC] full refresh', e); });
        }

        /* ── Init ─────────────────────────────────────────── */

        Promise.all([apiFetch('/get/games'), apiFetch('/get/teams')])
            .then(function (results) {
                allGames = results[0].games || [];
                allTeams = results[1].teams || [];
                teamsByName = {};
                allTeams.forEach(function (t) { if (t.name_en) teamsByName[t.name_en] = t; });

                renderTeams();
                renderGroups();
                renderCalendar();
                syncPolling();

                /* refresh everything every 60 s */
                setInterval(refreshAllGames, 60000);
            })
            .catch(function (e) { console.error('[WC] init error', e); });

    }());
    </script>

    </body>
</html>
